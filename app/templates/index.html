<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a1a;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 0.4rem;
    }

    input[type="url"] {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="url"]:focus {
      border-color: #4f46e5;
    }

    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.75rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #4338ca;
    }

    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 8px;
    }

    .result p {
      font-size: 0.85rem;
      color: #166534;
      margin-bottom: 0.4rem;
      font-weight: 600;
    }

    .result a {
      color: #15803d;
      font-size: 1rem;
      word-break: break-all;
      text-decoration: none;
      font-weight: 700;
    }

    .result a:hover {
      text-decoration: underline;
    }

    .error {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #fef2f2;
      border: 1.5px solid #fecaca;
      border-radius: 8px;
      color: #991b1b;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>URL Shortener</h1>
    <p class="subtitle">Paste a long URL and get a short one instantly.</p>

    <form method="POST" action="/">
      <label for="url">Long URL</label>
      <input
        type="url"
        id="url"
        name="url"
        placeholder="https://example.com/very/long/url"
        value="{{ submitted_url or '' }}"
        required
      />
      <button type="submit">Shorten</button>
    </form>

    {% if short_url %}
    <div class="result">
      <p>Your shortened URL:</p>
      <a href="{{ short_url }}" target="_blank">{{ request.host_url }}{{ short_code }}</a>
    </div>
    {% endif %}

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
  </div>
</body>
</html>
